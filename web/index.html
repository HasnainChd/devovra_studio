  <style>
    /* Reset & Loading Screen Styling */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: background-color 0.3s ease;
    }

    /* System Theme Awareness for Loader */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #090D16;
        color: #FFFFFF;
      }
    }
    @media (prefers-color-scheme: light) {
      body {
        background-color: #FFFFFF;
        color: #0F172A;
      }
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Double Pulse Spinner */
    .spinner {
      width: 50px;
      height: 50px;
      position: relative;
      margin-bottom: 24px;
    }

    .double-bounce1, .double-bounce2 {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-color: #4F46E5; /* Indigo */
      opacity: 0.6;
      position: absolute;
      top: 0;
      left: 0;
      animation: sk-bounce 2.0s infinite ease-in-out;
    }

    .double-bounce2 {
      animation-delay: -1.0s;
      background-color: #8B5CF6; /* Violet */
    }

    @keyframes sk-bounce {
      0%, 100% { 
        transform: scale(0.0);
      } 50% { 
        transform: scale(1.0);
      }
    }

    .loader-text {
      font-weight: 700;
      letter-spacing: 3px;
      font-size: 15px;
      opacity: 0.8;
      animation: pulse-text 2s infinite ease-in-out;
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1.0; }
    }
  </style>
</head>
<body>
  <div class="loader-container" id="loading-indicator">
    <div class="spinner">
      <div class="double-bounce1"></div>
      <div class="double-bounce2"></div>
    </div>
    <div class="loader-text">DEVORA STUDIOS</div>
  </div>

  <script>
    // Remove loading indicator once Flutter is ready
    window.addEventListener('load', function(ev) {
      // Flutter bootstrap script handles rendering
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            // Remove CSS loader from DOM
            var loader = document.getElementById('loading-indicator');
            if (loader) {
              loader.remove();
            }
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
